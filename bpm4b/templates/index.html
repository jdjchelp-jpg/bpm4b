<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM4B Pro | AI Audiobook Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #818cf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 5rem;
            position: relative;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 100px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            border-radius: 100px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .tool-panel {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tool-panel.active {
            display: block;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 3rem;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }

        .drop-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.02);
            position: relative;
        }

        .drop-zone:hover, .drop-zone.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone i {
            display: block;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .btn-build {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 30px -10px var(--primary-glow);
        }

        .btn-build:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .progress-container {
            margin-top: 2rem;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .progress-track {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        .chapter-list {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            margin-top: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .chapter-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .chapter-item:last-child {
            border: none;
        }

        .chapter-item input {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            color: white;
            font-family: inherit;
        }

        .chapter-title { flex: 1; }
        .chapter-time { width: 120px; }

        .select-modern {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            appearance: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="hero-title">BPM4B PRO</h1>
            <p class="hero-subtitle">v9.0.0 • AI-Powered Audiobook Generation & High-Fidelity Conversion</p>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('mp3-to-m4b')">MP3 → M4B</button>
            <button class="tab-btn" onclick="switchTab('m4b-to-mp3')">M4B → MP3</button>
            <button class="tab-btn" onclick="switchTab('audiobook-gen')">Audiobook Gen</button>
        </div>

        <!-- MP3 to M4B Modern -->
        <div id="mp3-to-m4b" class="tool-panel active">
            <div class="card">
                <form id="form-mp3">
                    <div class="form-group">
                        <label>Source MP3</label>
                        <div class="drop-zone" id="drop-mp3">
                            <i>⚡</i>
                            <p id="label-mp3">Drop your MP3 here or click to browse</p>
                            <input type="file" id="input-mp3" accept=".mp3">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Chapters</label>
                        <div class="chapter-list" id="list-chapters">
                            <!-- JS populated -->
                        </div>
                        <button type="button" class="tab-btn" style="margin-top:1rem; border:1px solid var(--glass-border)" onclick="addChapter()">+ Add Chapter</button>
                    </div>

                    <button type="submit" class="btn-build">Build M4B Audiobook</button>
                </form>

                <div class="progress-container" id="progress-mp3">
                    <div class="progress-header">
                        <span id="status-mp3">Preparing...</span>
                        <span id="percent-mp3">0%</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="fill-mp3"></div></div>
                </div>
            </div>
        </div>

        <!-- M4B to MP3 -->
        <div id="m4b-to-mp3" class="tool-panel">
            <div class="card">
                <form id="form-m4b">
                    <div class="form-group">
                        <label>Source M4B/M4A</label>
                        <div class="drop-zone" id="drop-m4b">
                            <i>🎧</i>
                            <p id="label-m4b">Select audiobook file</p>
                            <input type="file" id="input-m4b" accept=".m4b,.m4a">
                        </div>
                    </div>
                    <button type="submit" class="btn-build">Convert to Hi-Fi MP3</button>
                </form>
                <div class="progress-container" id="progress-m4b">
                    <div class="progress-header">
                        <span id="status-m4b">Converting...</span>
                        <span id="percent-m4b">0%</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="fill-m4b"></div></div>
                </div>
            </div>
        </div>

        <!-- Audiobook Generator -->
        <div id="audiobook-gen" class="tool-panel">
            <div class="card">
                <form id="form-gen">
                    <div class="form-group">
                        <label>Document (PDF/DOCX/TXT)</label>
                        <div class="drop-zone" id="drop-gen">
                            <i>📚</i>
                            <p id="label-gen">Choose your document</p>
                            <input type="file" id="input-gen" accept=".pdf,.docx,.txt,.epub">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>AI Voice (Kokoro)</label>
                        <select class="select-modern" id="voice-select">
                            <option value="af_heart">Heart (F) - Warm & Clear</option>
                            <option value="af_bella">Bella (F) - Professional</option>
                            <option value="am_adam">Adam (M) - Energetic</option>
                            <option value="am_echo">Echo (M) - Calm</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-build">Generate AI Audiobook</button>
                </form>
                <div class="progress-container" id="progress-gen">
                    <div class="progress-header">
                        <span id="status-gen">Initializing AI...</span>
                        <span id="percent-gen">0%</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="fill-gen"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // --- Chapter Logic ---
        function addChapter(title = '', time = '0:00') {
            const list = document.getElementById('list-chapters');
            const div = document.createElement('div');
            div.className = 'chapter-item';
            div.innerHTML = `
                <input type="text" class="chapter-title" placeholder="Chapter Title" value="${title}">
                <input type="text" class="chapter-time" placeholder="0:00" value="${time}">
                <button type="button" class="tab-btn" onclick="this.parentElement.remove()" style="padding:0.5rem">×</button>
            `;
            list.appendChild(div);
        }

        // Initialize with intro
        if (document.getElementById('list-chapters')) addChapter('Introduction', '0:00');

        // --- File Drop Handling ---
        function setupDrop(id) {
            const drop = document.getElementById(`drop-${id}`);
            const input = document.getElementById(`input-${id}`);
            const label = document.getElementById(`label-${id}`);

            drop.onclick = () => input.click();
            input.onchange = () => { label.textContent = input.files[0].name; };
            
            drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('active'); };
            drop.ondragleave = () => drop.classList.remove('active');
            drop.ondrop = (e) => {
                e.preventDefault();
                drop.classList.remove('active');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    label.textContent = input.files[0].name;
                }
            };
        }

        ['mp3', 'm4b', 'gen'].forEach(setupDrop);

        // --- API Logic ---
        async function handleConversion(formId, apiPath, progressId) {
            const form = document.getElementById(formId);
            const progress = document.getElementById(progressId);
            const fill = progress.querySelector('.progress-fill');
            const status = progress.querySelector('span:first-child');
            const percent = progress.querySelector('span:last-child');

            form.onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(form);
                
                // Add manual inputs for MP3 chapters
                if (formId === 'form-mp3') {
                    const chaps = [];
                    document.querySelectorAll('.chapter-item').forEach(item => {
                        chaps.push({
                            title: item.querySelector('.chapter-title').value,
                            start_time: item.querySelector('.chapter-time').value
                        });
                    });
                    formData.append('chapters', JSON.stringify(chaps));
                    formData.append('mp3_file', document.getElementById('input-mp3').files[0]);
                } else if (formId === 'form-m4b') {
                    formData.append('source_file', document.getElementById('input-m4b').files[0]);
                } else if (formId === 'form-gen') {
                    formData.append('doc_file', document.getElementById('input-gen').files[0]);
                    formData.append('voice', document.getElementById('voice-select').value);
                }

                progress.style.display = 'block';
                fill.style.width = '10%';
                status.textContent = 'Uploading...';

                try {
                    const res = await fetch(apiPath, { method: 'POST', body: formData });
                    if (!res.ok) throw new Error(await res.text());

                    fill.style.width = '100%';
                    percent.textContent = '100%';
                    status.textContent = 'Complete!';

                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "output_" + Date.now() + (apiPath.includes('mp3') ? '.m4b' : '.mp3');
                    a.click();
                } catch (err) {
                    status.textContent = 'Error: ' + err.message;
                    fill.style.background = 'var(--error)';
                }
            };
        }

        handleConversion('form-mp3', '/api/convert', 'progress-mp3');
        handleConversion('form-m4b', '/api/convert', 'progress-m4b');
        handleConversion('form-gen', '/api/generate-audiobook', 'progress-gen');

    </script>
</body>
</html>
